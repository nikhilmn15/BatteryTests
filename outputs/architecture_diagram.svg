<text x="340" y="593" text-anchor="middle" font-size="11" fill="#9a9fa8">SOH, RUL, replace, stage, anomaly flag</text>

<text x="340" y="630" text-anchor="middle" font-size="10" fill="#6a6f78">Li-ion Battery Degradation Pipeline -- MIT/Kaggle Cycle-Life Dataset</text>
